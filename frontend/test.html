<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои таблицы</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f9;
        }

        h1 {
            color: #333;
        }

        h2 {
            color: #333;
            margin-top: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background-color: white;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #ddd;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        .error {
            color: red;
        }

        /* Стили для цветного квадратика */
        .color-box {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 1px solid #ccc;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Управление данными</h1>

        <!-- Таблица стран -->
        <h2>Страны</h2>
        <p v-if="countriesLoading" class="loading">Загрузка стран...</p>
        <p v-else-if="countriesError" class="error">{{ countriesError }}</p>
        <table v-else-if="countries.length > 0">
            <thead>
                <tr>
                    <th>Название</th>
                </tr>
            </thead>
            <tbody>
                <!-- v-for создает строку для каждой страны из массива countries -->
                <tr v-for="country in countries" :key="country.id">
                    <td>{{ country.name }}</td>
                </tr>
            </tbody>
        </table>
        <p v-else>Нет данных о странах</p>

        <!-- Таблица цветов -->
        <h2>Цвета</h2>
        <p v-if="colorsLoading" class="loading">Загрузка цветов...</p>
        <p v-else-if="colorsError" class="error">{{ colorsError }}</p>
        <table v-else-if="colors.length > 0">
            <thead>
                <tr>
                    <th>Название</th>
                    <th>Код</th>
                </tr>
            </thead>
            <tbody>
                <!-- v-for создает строку для каждого цвета -->
                <tr v-for="color in colors" :key="color.id">
                    <td>{{ color.name }}</td>
                    <td>
                        <!-- Показываем цветной квадратик, если есть код цвета -->
                        <template v-if="color.code">
                            <span 
                                class="color-box" 
                                :style="{ backgroundColor: color.code }"
                            ></span>
                            {{ color.code }}
                        </template>
                        <span v-else>—</span>
                    </td>
                </tr>
            </tbody>
        </table
        <p v-else>Нет данных о цветах</p>
    </div>

    <!-- Подключаем Vue.js 3 через CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    
    <script>
        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    // Данные для стран
                    countries: [],
                    countriesLoading: false,
                    countriesError: null,
                    
                    // Данные для цветов
                    colors: [],
                    colorsLoading: false,
                    colorsError: null,
                    
                    // URL твоего FastAPI бэкенда
                    apiUrl: 'http://localhost:8000'
                }
            },
            
            // Этот метод запускается при загрузке страницы
            async mounted() {
                await this.fetchCountries();
                await this.fetchColors();
            },
            
            methods: {
                // Загрузка стран из API
                async fetchCountries() {
                    this.countriesLoading = true;
                    this.countriesError = null;
                    
                    try {
                        const response = await fetch(`${this.apiUrl}/countries/`);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        this.countries = await response.json();
                    } catch (error) {
                        console.error('Ошибка загрузки стран:', error);
                        this.countriesError = 'Не удалось загрузить страны. Проверьте, запущен ли backend.';
                    } finally {
                        this.countriesLoading = false;
                    }
                },
                
                // Загрузка цветов из API
                async fetchColors() {
                    this.colorsLoading = true;
                    this.colorsError = null;
                    
                    try {
                        const response = await fetch(`${this.apiUrl}/colors/`);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }
                        
                        this.colors = await response.json();
                    } catch (error) {
                        console.error('Ошибка загрузки цветов:', error);
                        this.colorsError = 'Не удалось загрузить цвета. Проверьте, запущен ли backend.';
                    } finally {
                        this.colorsLoading = false;
                    }
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
