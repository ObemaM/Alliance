<!DOCTYPE html>
<!-- 
  DOCTYPE html сообщает браузеру, что это HTML5 документ.
  Это первая строка любого современного веб-сайта.
-->
<html lang="ru">
<!-- 
  Тег <html> - это корневой элемент страницы. 
  lang="ru" указывает, что основной язык страницы - русский.
-->
<head>
    <!-- 
      В <head> хранится техническая информация, которая не видна на странице напрямую:
      кодировка, заголовок вкладки, стили (CSS) и скрипты.
    -->
    <meta charset="UTF-8">
    <!-- Устанавливает кодировку UTF-8, чтобы корректно отображались русские буквы -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Делает страницу адаптивной для мобильных устройств -->
    
    <title>Мои Таблицы</title>
    <!-- Текст, который будет написан на вкладке браузера -->

    <style>
        /* 
           Тег <style> используется для CSS (каскадных таблиц стилей).
           Здесь мы задаем внешний вид элементов.
        */

        body {
            font-family: Arial, sans-serif; /* Шрифт текста */
            margin: 20px; /* Отступы от краев окна */
            background-color: #f4f4f9; /* Светлый фон страницы */
        }

        h1 {
            color: #333; /* Цвет заголовка */
        }

        /* Стили для таблицы */
        table {
            width: 100%; /* Таблица занимает всю ширину */
            border-collapse: collapse; /* Убирает двойные границы между ячейками */
            margin-bottom: 30px; /* Отступ снизу от таблицы */
            background-color: white; /* Белый фон таблицы */
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); /* Небольшая тень для красоты */
        }

        /* Стили для заголовков таблицы (th) и ячеек (td) */
        th, td {
            border: 1px solid #ddd; /* Тонкая серая рамка */
            padding: 12px; /* Внутренний отступ в ячейке */
            text-align: left; /* Выравнивание текста по левому краю */
        }

        /* Стили специально для заголовков столбцов */
        th {
            background-color: #4CAF50; /* Зеленый фон */
            color: white; /* Белый текст */
        }

        /* "Зебра" - красим четные строки в другой цвет */
        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        /* Эффект при наведении мышки на строку */
        tr:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>
    <!-- 
      В <body> находится всё, что пользователь видит на экране:
      текст, картинки, таблицы, кнопки.
    -->

    <h1>Управление данными</h1>

    <!-- Первая таблица: Страны (Countries) -->
    <h2>Страны (Countries)</h2>
    <!-- Тег <table> создает таблицу -->
    <table>
        <!-- <thead> группирует заголовок таблицы -->
        <thead>
            <!-- <tr> (table row) - это строка таблицы -->
            <tr>
                <!-- <th> (table header) - это ячейка-заголовок -->
                <th>ID</th>
                <th>Название (Name)</th>
            </tr>
        </thead>
        <!-- <tbody> группирует основное содержимое таблицы -->
        <tbody>
            <!-- Пример данных (строка 1) -->
            <tr>
                <!-- <td> (table data) - это обычная ячейка с данными -->
                <td>1</td>
                <td>Россия</td>
            </tr>
            <!-- Пример данных (строка 2) -->
            <tr>
                <td>2</td>
                <td>США</td>
            </tr>
            <!-- Пример данных (строка 3) -->
            <tr>
                <td>3</td>
                <td>Китай</td>
            </tr>
        </tbody>
    </table>

    <!-- Вторая таблица: Цвета (Colors) -->
    <h2>Цвета (Colors)</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Название (Name)</th>
                <th>Код (Code)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Красный</td>
                <td>#FF0000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Зеленый</td>
                <td>#00FF00</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Синий</td>
                <td>#0000FF</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
